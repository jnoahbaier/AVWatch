services:
  - type: web
    name: avwatch-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    healthCheckPath: /health
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: false
      - key: DATABASE_URL
        sync: false   # set manually in Render dashboard
      - key: GEMINI_API_KEY
        sync: false   # set manually in Render dashboard
      - key: ADMIN_API_KEY
        sync: false   # set manually in Render dashboard
      - key: REDDIT_USER_AGENT
        value: avwatch:v1.0 (by /u/avwatchbot)
